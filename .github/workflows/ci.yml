name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Python packages (uniform: ruff + ruff-format + mypy + pytest) ----
  python:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/portfolio-optimization
          - packages/backtesting
          - packages/market-data
          - packages/options-pricing
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Tests
        run: pytest

  # ---- Order book: C++17 matching-engine core ----
  order-book-cpp:
    name: order-book (C++ / ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build
        run: |
          cmake -S cpp/order-book -B cpp/order-book/build -DCMAKE_BUILD_TYPE=Release
          cmake --build cpp/order-book/build
      - name: ctest
        run: ctest --test-dir cpp/order-book/build --output-on-failure

  # ---- Order book: Python visualization / simulator ----
  order-book-python:
    name: order-book (Python viz)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpp/order-book
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy python
      - name: Tests (fixture rebuilds the C++ demo)
        run: pytest

  # ---- Showcase site: static Vite build ----
  showcase-site:
    name: showcase-site (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/showcase-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
