# Pre-commit hooks for the quant monorepo.
# Install once:  pip install pre-commit && pre-commit install
# Run on all files:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff           # lint all Python packages
        args: [--fix]
      - id: ruff-format    # format all Python packages

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.5
    hooks:
      - id: clang-format
        files: ^cpp/order-book/.*\.(c|cc|cpp|h|hpp)$
