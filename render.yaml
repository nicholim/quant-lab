# Render blueprint for the quant monorepo.
# Each service sets `rootDir` so Render builds it from its package subdirectory
# while still having the whole repo checked out (so co-located deps resolve).
# Deploy: push the repo to GitHub, then Render Dashboard -> New -> Blueprint.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ---- Backtesting dashboard (Dash / gunicorn) ----
  # In the monorepo the optimizer is co-located, so requirements.txt's
  # `-e ../portfolio-optimization` resolves at build time — no git-URL needed.
  - type: web
    name: backtesting-dashboard
    runtime: python
    plan: free
    rootDir: packages/backtesting
    branch: main
    healthCheckPath: /
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard:server --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # The dashboard fetches OHLCV via yfinance, which is frequently
      # rate-limited from cloud IPs. Unlike the options app, the backtesting
      # data layer RAISES (MarketDataError) on a failed fetch rather than
      # auto-serving the fixture — the dashboard surfaces that as an in-UI
      # error instead of 500ing, but the demo won't show results. Leave OFFLINE
      # OFF by default so live data shows when egress allows; uncomment the line
      # below to FORCE the deterministic bundled-fixture demo (see DEPLOY.md
      # "Live market data / OFFLINE flags"). The env flag overrides the app's
      # offline=False arg at the data layer.
      # - key: BACKTESTING_OFFLINE
      #   value: "1"

  # ---- Options pricing calculator (Streamlit) ----
  - type: web
    name: options-pricing-calculator
    runtime: python
    plan: free
    rootDir: packages/options-pricing
    branch: main
    healthCheckPath: /_stcore/health
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false
      --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Live spot quotes via Finnhub (free tier). Optional: if unset, spot
      # falls back to yfinance. Chains/expirations are keyless (yfinance).
      # Set this secret in the Render dashboard after the Blueprint applies.
      - key: FINNHUB_API_KEY
        sync: false
      # The "Live market" tab fetches chains via yfinance, which is often
      # rate-limited from cloud IPs. The app already falls back to the bundled
      # sample chain on failure. To FORCE the deterministic offline demo,
      # uncomment the line below (see DEPLOY.md "Live market data").
      # - key: OPTIONS_PRICING_OFFLINE
      #   value: "1"

  # ---- Portfolio optimization FastAPI demo ----
  - type: web
    name: portfolio-optimization-api
    runtime: python
    plan: free
    rootDir: packages/portfolio-optimization
    branch: main
    healthCheckPath: /health
    autoDeploy: false
    buildCommand: pip install -r requirements-api.txt && pip install -e .
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # No data flag needed: the FastAPI demo optimizes a returns matrix POSTed
      # by the caller, so the deployed service does NO network fetch and is
      # deterministic by construction. (The library/CLI still honor
      # PORTFOLIO_OFFLINE=1 for their own yfinance fetches; not relevant here.)

  # ---- Market data ingestion daemon + Key Value cache — DISABLED on the free plan ----
  # Render's FREE plan does not offer Background Workers or Key Value (Redis):
  # the Blueprint apply reports "service type is not available for this plan".
  # The market-data worker is a HEADLESS daemon with NO public web UI (the
  # showcase marks it liveDemo:false), so omitting it costs the visible demo
  # nothing — the three Web Services above are the live demos.
  #
  # TO RUN IT: upgrade to a paid Render plan and restore the `worker` +
  # `keyvalue` service blocks from git history (they were present through commit
  # cc3b530 — `git show cc3b530:render.yaml`). The worker defaults to
  # STORAGE_BACKEND=duckdb, so it needs only the Key Value instance + disk; no
  # external database is required.
