# Render blueprint for the quant monorepo.
# Each service sets `rootDir` so Render builds it from its package subdirectory
# while still having the whole repo checked out (so co-located deps resolve).
# Deploy: push the repo to GitHub, then Render Dashboard -> New -> Blueprint.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ---- Backtesting dashboard (Dash / gunicorn) ----
  # In the monorepo the optimizer is co-located, so requirements.txt's
  # `-e ../portfolio-optimization` resolves at build time — no git-URL needed.
  - type: web
    name: backtesting-dashboard
    runtime: python
    plan: free
    rootDir: packages/backtesting
    branch: main
    healthCheckPath: /
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard:server --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # The dashboard fetches OHLCV via yfinance, which is frequently
      # rate-limited from cloud IPs. Unlike the options app, the backtesting
      # data layer RAISES (MarketDataError) on a failed fetch rather than
      # auto-serving the fixture — the dashboard surfaces that as an in-UI
      # error instead of 500ing, but the demo won't show results. Leave OFFLINE
      # OFF by default so live data shows when egress allows; uncomment the line
      # below to FORCE the deterministic bundled-fixture demo (see DEPLOY.md
      # "Live market data / OFFLINE flags"). The env flag overrides the app's
      # offline=False arg at the data layer.
      # - key: BACKTESTING_OFFLINE
      #   value: "1"

  # ---- Options pricing calculator (Streamlit) ----
  - type: web
    name: options-pricing-calculator
    runtime: python
    plan: free
    rootDir: packages/options-pricing
    branch: main
    healthCheckPath: /_stcore/health
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false
      --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Live spot quotes via Finnhub (free tier). Optional: if unset, spot
      # falls back to yfinance. Chains/expirations are keyless (yfinance).
      # Set this secret in the Render dashboard after the Blueprint applies.
      - key: FINNHUB_API_KEY
        sync: false
      # The "Live market" tab fetches chains via yfinance, which is often
      # rate-limited from cloud IPs. The app already falls back to the bundled
      # sample chain on failure. To FORCE the deterministic offline demo,
      # uncomment the line below (see DEPLOY.md "Live market data").
      # - key: OPTIONS_PRICING_OFFLINE
      #   value: "1"

  # ---- Portfolio optimization FastAPI demo ----
  - type: web
    name: portfolio-optimization-api
    runtime: python
    plan: free
    rootDir: packages/portfolio-optimization
    branch: main
    healthCheckPath: /health
    autoDeploy: false
    buildCommand: pip install -r requirements-api.txt && pip install -e .
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # No data flag needed: the FastAPI demo optimizes a returns matrix POSTed
      # by the caller, so the deployed service does NO network fetch and is
      # deterministic by construction. (The library/CLI still honor
      # PORTFOLIO_OFFLINE=1 for their own yfinance fetches; not relevant here.)

  # ---- Market data ingestion daemon (Docker background worker) ----
  # DEFAULT deploy needs NO external database: STORAGE_BACKEND=duckdb writes the
  # normalized trades/ohlcv to a local DuckDB file on disk, so the worker runs on
  # just managed Redis (wired below) + the container's writable disk. NOTE: on
  # the free plan that disk is EPHEMERAL — fine for a live-streaming demo, but
  # data is lost on redeploy/restart. For durable storage either attach a Render
  # persistent disk, or switch to Timescale by setting STORAGE_BACKEND=timescale
  # and DATABASE_URL (kept below as an optional sync:false secret).
  # dockerfilePath is relative to rootDir.
  - type: worker
    name: market-data-pipeline
    runtime: docker
    plan: free
    rootDir: packages/market-data
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: market-data-cache
          property: connectionString
      # No-external-DB default: persist ticks/bars to a local DuckDB file.
      - key: STORAGE_BACKEND
        value: duckdb
      # DuckDB file path (under the working dir; ephemeral on the free plan).
      - key: DUCKDB_PATH
        value: data/marketdata.duckdb
      # OPTIONAL — only used if you switch STORAGE_BACKEND to "timescale".
      # Leave UNSET for the default DuckDB demo. To use Timescale, set
      # STORAGE_BACKEND=timescale and paste an external TimescaleDB URL here
      # (Timescale Cloud / Aiven; Render's managed Postgres lacks the extension).
      - key: DATABASE_URL
        sync: false
      # Exchange adapter: "binance" (default, keyless) or "coinbase".
      - key: EXCHANGE
        value: binance
      - key: WS_URL
        value: wss://stream.binance.com:9443/ws
      - key: SYMBOLS
        value: btcusdt,ethusdt,solusdt
      - key: LOG_LEVEL
        value: INFO
      - key: BATCH_SIZE
        value: "100"
      - key: FLUSH_INTERVAL_SECONDS
        value: "5"
      # Backpressure cap on the in-memory trade buffer (>= BATCH_SIZE).
      - key: MAX_BUFFER_SIZE
        value: "1000"

keyValue:
  - name: market-data-cache
    plan: free
