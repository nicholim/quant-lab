<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="'Spline Sans Mono', ui-monospace, monospace">
  <rect width="640" height="300" fill="none"/>

  <!-- baseline + mid -->
  <line x1="40" y1="250" x2="600" y2="250" stroke="#1c1d22" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="250" stroke="#c9c9c4" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- bids (cumulative, stepped) — ink -->
  <polyline fill="#1c1d22" fill-opacity="0.10" stroke="#1c1d22" stroke-width="2" stroke-linejoin="round"
    points="40,250 90,250 90,222 140,222 140,190 190,190 190,152 240,152 240,110 290,110 290,82 320,82 320,250"/>

  <!-- asks (cumulative, stepped) — signal red -->
  <polyline fill="#cf3a22" fill-opacity="0.12" stroke="#cf3a22" stroke-width="2" stroke-linejoin="round"
    points="320,82 350,82 350,108 400,108 400,146 450,146 450,182 500,182 500,216 550,216 550,240 600,240 600,250 320,250"/>

  <text x="40" y="40" fill="#1c1d22" font-size="14" font-weight="600">bids</text>
  <text x="600" y="40" fill="#cf3a22" font-size="14" font-weight="600" text-anchor="end">asks</text>
  <text x="320" y="270" fill="#7d7d77" font-size="11" text-anchor="middle">mid price</text>
  <text x="40" y="270" fill="#7d7d77" font-size="11">lower</text>
  <text x="600" y="270" fill="#7d7d77" font-size="11" text-anchor="end">higher</text>
</svg>
